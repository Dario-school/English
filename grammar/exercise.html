<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grammatik Übung – EnglishLearn</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">📚 English<span class="dot">·</span>Learn</a>
    <nav class="nav">
      <a href="index.html">← Grammatik</a>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </nav>
  </div>
</header>

<div id="loadingScreen" style="text-align:center; padding:80px 24px;">
  <div style="font-size:3rem;">⏳</div><p>Laden…</p>
</div>

<!-- Level Selection -->
<div id="levelScreen" style="display:none;">
  <div class="page-header" id="topicHeader"></div>
  <div class="container" style="max-width:540px;">
    <div class="section-title">Level auswählen</div>
    <div class="level-list" id="levelList"></div>
    <div style="margin-top:24px; padding-bottom:48px;">
      <a href="index.html" class="btn btn-outline">← Zurück zur Übersicht</a>
    </div>
  </div>
</div>

<!-- Exercise -->
<div id="exerciseScreen" style="display:none;">
  <div class="container" style="max-width:680px;">
    <div style="padding: 24px 0 0;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span id="exerciseTopicTitle" style="font-size:0.85rem; color:var(--ink-muted);"></span>
        <span id="exerciseLevelBadge" style="font-size:0.8rem; font-weight:600; color:var(--red);"></span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-info">
        <span id="progressText">0 / 0</span>
        <span id="scoreText">✅ 0 &nbsp; ❌ 0</span>
      </div>
    </div>

    <div class="exercise-box" id="exerciseBox">
      <!-- Filled dynamically -->
    </div>

    <div id="feedbackRow" style="display:none; text-align:center; padding:12px 0 24px;">
      <div id="feedbackMsg" style="margin-bottom:12px; font-weight:600; font-size:1rem;"></div>
      <div id="hintBox" class="hint-box" style="display:none; max-width:480px; margin:0 auto 12px;"></div>
      <button class="btn btn-primary" onclick="nextExercise()">Weiter →</button>
    </div>
  </div>
</div>

<!-- Result -->
<div id="resultScreen" style="display:none;">
  <div class="container">
    <div class="result-card">
      <div style="font-size:3rem;" id="resultEmoji">🎉</div>
      <h2 id="resultTitle">Level abgeschlossen!</h2>
      <div class="result-score" id="resultScore">–%</div>
      <p class="result-subtitle" id="resultSub"></p>
      <div id="starMessage" style="font-size:1.5rem; margin:12px 0; display:none;"></div>
      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:24px;">
        <button class="btn btn-primary" id="nextLevelBtn" style="display:none;" onclick="goNextLevel()">▶️ Nächstes Level</button>
        <button class="btn btn-outline" onclick="goLevelSelect()">📋 Level-Auswahl</button>
        <a href="index.html" class="btn btn-ghost">← Übersicht</a>
      </div>
    </div>
  </div>
</div>

<script src="../js/storage.js"></script>
<script src="../js/grammar-engine.js"></script>
<script>
  // Theme
  const themeBtn = document.getElementById('themeToggle');
  document.body.classList.toggle('dark', Storage.getDarkMode());
  themeBtn.textContent = Storage.getDarkMode() ? '☀️' : '🌙';
  themeBtn.addEventListener('click', () => { Storage.setDarkMode(!Storage.getDarkMode()); location.reload(); });

  const params = new URLSearchParams(location.search);
  const topicGroup = params.get('group');
  const topicId    = params.get('id');
  const startLevel = params.get('level') ? parseInt(params.get('level')) : null;

  let correct = 0, wrong = 0;
  let currentLevel = null;

  async function init() {
    try {
      const path = `topics/${topicGroup}/${topicId}.json`;
      const res  = await fetch(path);
      const data = await res.json();
      // Manually set topicData
      Object.assign(GrammarEngine, { _topicData: data });
      GrammarEngine.loadTopic = async () => data;
      await GrammarEngine.loadTopic(topicGroup, topicId);
      // Patch: override internal topicData
      const td = GrammarEngine.topicData();
      document.getElementById('loadingScreen').style.display = 'none';

      if (startLevel) {
        startLevelExercise(startLevel);
      } else {
        showLevelSelect();
      }
    } catch(e) {
      console.error(e);
      document.getElementById('loadingScreen').innerHTML =
        '<p style="color:red;">⚠️ Übungsdaten konnten nicht geladen werden.</p><a href="index.html">← Zurück</a>';
    }
  }

  function showLevelSelect() {
    const td = GrammarEngine.topicData();
    document.getElementById('levelScreen').style.display = 'block';
    document.getElementById('topicHeader').innerHTML =
      `<h1>${td.title}</h1><p style="color:var(--ink-soft);">${td.description}</p>`;

    const savedTopic = Storage.getGrammarTopic(topicId);
    let html = '';
    td.levels.forEach(lvl => {
      const saved   = savedTopic.levels[lvl.level];
      const unlocked = Storage.isLevelUnlocked(topicId, lvl.level);
      const isLocked = !unlocked;
      const isDone   = saved && saved.completed;
      const isFinal  = lvl.level === 5;
      html += `<div class="level-row ${isLocked ? 'locked' : ''} ${isDone ? 'done' : ''}"
        onclick="${isLocked ? '' : `startLevel(${lvl.level})`}">
        <div class="level-num">${isLocked ? '🔒' : lvl.level}</div>
        <div>
          <div class="level-title">${isFinal ? '⭐ ' : ''}${lvl.title}</div>
          <div class="level-score">${isDone ? `✅ ${saved.score}%` : isLocked ? 'Gesperrt – ${lvl.level-1} mit ≥70% abschliessen' : 'Noch nicht gespielt'}</div>
        </div>
        ${isLocked ? '<div class="level-lock">🔒</div>' : ''}
      </div>`;
    });
    document.getElementById('levelList').innerHTML = html;
  }

  function startLevel(levelNum) {
    document.getElementById('levelScreen').style.display = 'none';
    currentLevel = levelNum;
    correct = 0; wrong = 0;
    try {
      const td = GrammarEngine.topicData();
      let exercises;
      if (levelNum === 5) {
        exercises = GrammarEngine.buildFinalTest();
        // manually set
        td.levels.find(l => l.level === 5).exercises = exercises;
      }
      GrammarEngine.startLevel(levelNum);
    } catch(e) { console.error(e); }
    document.getElementById('exerciseScreen').style.display = 'block';
    document.getElementById('exerciseTopicTitle').textContent = GrammarEngine.topicData().title;
    document.getElementById('exerciseLevelBadge').textContent = `Level ${levelNum}`;
    showExercise();
  }

  // alias for onclick in level list
  function startLevelExercise(n) { startLevel(n); }

  function showExercise() {
    if (GrammarEngine.isDone()) { showResult(); return; }
    const ex = GrammarEngine.currentExercise();
    updateProgress();
    document.getElementById('feedbackRow').style.display = 'none';
    document.getElementById('hintBox').style.display = 'none';
    renderExercise(ex);
  }

  function renderExercise(ex) {
    const box = document.getElementById('exerciseBox');
    let html = `<div class="exercise-instruction">${ex.instruction}</div>`;

    if (ex.type === 'fill-in-the-blank') {
      const parts = ex.sentence.split('___');
      html += `<div class="exercise-sentence">${parts[0]}<input type="text" class="fill-blank-input" id="fillInput" autocomplete="off" autocorrect="off" spellcheck="false">${parts[1] || ''}</div>`;
      html += `<button class="btn btn-primary" onclick="submitFill()">Prüfen ↵</button>`;

    } else if (ex.type === 'multiple-choice') {
      html += `<div class="exercise-sentence" style="margin-bottom:8px;">${ex.question}</div>`;
      html += '<div class="mc-options">';
      ex.options.forEach((opt, i) => {
        html += `<div class="mc-option" id="mc_${i}" onclick="submitMC('${opt.replace(/'/g,"\\'")}', ${i})">${opt}</div>`;
      });
      html += '</div>';

    } else if (ex.type === 'reorder') {
      html += `<div style="margin-bottom:12px; color:var(--ink-muted); font-size:0.9rem;">Klicke die Wörter in der richtigen Reihenfolge:</div>`;
      html += `<div class="reorder-words" id="reorderSource">`;
      ex.words.forEach((w, i) => {
        html += `<div class="word-chip" id="chip_${i}" onclick="addWord('${w.replace(/'/g,"\\'")}',${i})">${w}</div>`;
      });
      html += `</div>`;
      html += `<div style="min-height:44px; border:2px dashed var(--border); border-radius:var(--radius-sm); padding:8px; display:flex; flex-wrap:wrap; gap:8px; margin:12px 0;" id="reorderTarget"></div>`;
      html += `<button class="btn btn-outline btn-sm" onclick="clearReorder()" style="margin-right:8px;">✕ Leeren</button>`;
      html += `<button class="btn btn-primary" onclick="submitReorder()">Prüfen</button>`;

    } else if (ex.type === 'error-correction') {
      html += `<div class="exercise-sentence" style="background:var(--red-light); padding:12px 16px; border-radius:var(--radius-sm); color:var(--red-dark);">"${ex.sentence}"</div>`;
      html += `<div style="margin:16px 0 4px; font-size:0.85rem; color:var(--ink-muted);">Korrigierter Satz:</div>`;
      html += `<input type="text" style="width:100%; padding:12px 16px; border:2px solid var(--border); border-radius:var(--radius-sm); font-size:1rem; font-family:'DM Sans',sans-serif; outline:none;" id="errorInput" autocomplete="off">`;
      html += `<button class="btn btn-primary" style="margin-top:12px;" onclick="submitError()">Prüfen ↵</button>`;

    } else if (ex.type === 'translation') {
      html += `<div class="exercise-sentence">"${ex.sentence}"</div>`;
      html += `<input type="text" style="width:100%; padding:12px 16px; border:2px solid var(--border); border-radius:var(--radius-sm); font-size:1rem; font-family:'DM Sans',sans-serif; outline:none; margin-bottom:12px;" id="transInput" autocomplete="off" spellcheck="false">`;
      html += `<button class="btn btn-primary" onclick="submitTranslation()">Prüfen ↵</button>`;
    }

    box.innerHTML = html;

    // Auto-focus input
    setTimeout(() => {
      const inp = box.querySelector('input[type="text"]');
      if (inp) inp.focus();
    }, 50);
  }

  // Reorder state
  let reorderChosen = [];
  function addWord(word, idx) {
    const chip = document.getElementById(`chip_${idx}`);
    if (chip.classList.contains('used')) return;
    chip.classList.add('used');
    reorderChosen.push({ word, idx });
    const target = document.getElementById('reorderTarget');
    target.innerHTML += `<div class="word-chip" style="background:var(--ink);" data-idx="${idx}">${word}</div>`;
  }
  function clearReorder() {
    reorderChosen = [];
    document.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used'));
    document.getElementById('reorderTarget').innerHTML = '';
  }

  function submitFill() {
    const inp = document.getElementById('fillInput');
    const ok  = GrammarEngine.checkAnswer(GrammarEngine.currentExercise(), inp.value);
    showFeedback(ok, GrammarEngine.currentExercise());
  }
  function submitMC(opt, idx) {
    const ok = GrammarEngine.checkAnswer(GrammarEngine.currentExercise(), opt);
    document.getElementById(`mc_${idx}`).classList.add(ok ? 'correct' : 'wrong');
    if (!ok) {
      // Show correct
      const ex = GrammarEngine.currentExercise();
      ex.options.forEach((o, i) => {
        if (o.toLowerCase() === ex.answer.toLowerCase()) {
          document.getElementById(`mc_${i}`).classList.add('correct');
        }
      });
    }
    showFeedback(ok, GrammarEngine.currentExercise());
  }
  function submitReorder() {
    const answer = reorderChosen.map(r => r.word).join(' ');
    const ok     = GrammarEngine.checkAnswer(GrammarEngine.currentExercise(), answer);
    showFeedback(ok, GrammarEngine.currentExercise());
  }
  function submitError() {
    const ok = GrammarEngine.checkAnswer(GrammarEngine.currentExercise(), document.getElementById('errorInput').value);
    showFeedback(ok, GrammarEngine.currentExercise());
  }
  function submitTranslation() {
    const ok = GrammarEngine.checkAnswer(GrammarEngine.currentExercise(), document.getElementById('transInput').value);
    showFeedback(ok, GrammarEngine.currentExercise());
  }

  function showFeedback(ok, ex) {
    if (ok) correct++; else wrong++;
    document.getElementById('feedbackRow').style.display = 'block';
    document.getElementById('feedbackMsg').innerHTML = ok
      ? `<span style="color:var(--green);">✅ Richtig!</span>`
      : `<span style="color:#C0392B;">❌ Falsch. Richtig: <strong>${Array.isArray(ex.answer) ? ex.answer[0] : ex.answer}</strong></span>`;
    if (ex.hint && !ok) {
      document.getElementById('hintBox').textContent = '💡 ' + ex.hint;
      document.getElementById('hintBox').style.display = 'block';
    }
    updateProgress();
    // Disable inputs
    document.querySelectorAll('.exercise-box input, .exercise-box button, .mc-option, .word-chip').forEach(el => {
      el.style.pointerEvents = 'none';
    });
  }

  function nextExercise() {
    GrammarEngine.advance();
    showExercise();
  }

  function updateProgress() {
    const total = GrammarEngine.totalExercises();
    const pos   = GrammarEngine.currentPos();
    document.getElementById('progressFill').style.width = `${(pos/total)*100}%`;
    document.getElementById('progressText').textContent = `${pos} / ${total}`;
    document.getElementById('scoreText').textContent    = `✅ ${correct} &nbsp; ❌ ${wrong}`;
  }

  function showResult() {
    document.getElementById('exerciseScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display   = 'block';
    const sum = GrammarEngine.getSummary();
    document.getElementById('resultScore').textContent = `${sum.percent}%`;
    document.getElementById('resultSub').textContent   = `${sum.correct} von ${sum.total} richtig`;
    document.getElementById('resultEmoji').textContent  = sum.percent >= 80 ? '🎉' : sum.percent >= 60 ? '👍' : '💪';

    Storage.saveGrammarLevel(topicId, currentLevel, sum.percent);

    if (currentLevel === 5 && sum.percent >= 80) {
      const starMsg = document.getElementById('starMessage');
      starMsg.style.display = 'block';
      starMsg.textContent   = '⭐ Du hast einen Stern für dieses Thema verdient!';
    }

    // Show next level button if applicable
    if (currentLevel < 5 && sum.percent >= 70) {
      document.getElementById('nextLevelBtn').style.display = 'inline-flex';
    }
  }

  function goNextLevel() { startLevel(currentLevel + 1); }
  function goLevelSelect() {
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('levelScreen').style.display  = 'block';
    showLevelSelect();
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('feedbackRow').style.display === 'block') {
      e.preventDefault(); nextExercise();
    }
  });

  init();
</script>
</body>
</html>
